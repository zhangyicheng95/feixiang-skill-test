<!-- P4 酸与碱 -->
<template class="page-data" data-id="4" data-name="酸与碱">
  <div class="page-container">
    <p class="eyebrow">基础知识</p>
    <h2 class="page-title">认识酸与碱</h2>
    <div class="two-col">
      <div class="card card-white">
        <strong>酸</strong>
        <ul class="compact" style="margin-top:6px">
          <li>溶液中含 H⁺（氢离子）</li>
          <li>例：盐酸 HCl、硫酸 H₂SO₄</li>
          <li>尝之酸味，能使紫色石蕊变红</li>
        </ul>
      </div>
      <div class="card card-white">
        <strong>碱</strong>
        <ul class="compact" style="margin-top:6px">
          <li>溶液中含 OH⁻（氢氧根离子）</li>
          <li>例：氢氧化钠 NaOH、熟石灰 Ca(OH)₂</li>
          <li>触感滑腻，能使紫色石蕊变蓝</li>
        </ul>
      </div>
    </div>
    <div id="extra" class="card" style="display:none">
      <ul class="compact">
        <li>酸碱指示剂：石蕊遇酸变红、遇碱变蓝；酚酞遇碱变红、遇酸无色。</li>
        <li>pH &lt; 7 呈酸性，pH &gt; 7 呈碱性，pH = 7 呈中性。</li>
        <li>酸碱溶液具有腐蚀性，实验须规范操作。</li>
      </ul>
    </div>

<!-- P5 中和反应 -->
<template class="page-data" data-id="5" data-name="中和反应">
  <div class="page-container">
    <p class="eyebrow">核心概念</p>
    <h2 class="page-title">什么是中和反应？</h2>
    <div class="card card-white fill" style="display:flex;flex-direction:column;justify-content:center;gap:12px">
      <p style="margin:0;font-size:17px;line-height:1.7"><strong>定义：</strong>酸和碱作用生成盐和水的反应，叫做中和反应。</p>
      <p class="chem" style="margin:0;font-size:22px;text-align:center;padding:12px;background:var(--demo-bg);border-radius:var(--radius);border:2px solid var(--demo-border)">
        酸 + 碱 → 盐 + 水<br>
        <span style="font-size:18px;color:var(--accent)">H⁺ + OH⁻ → H₂O</span>
      </p>
      <ul class="compact">
        <li>实质：氢离子与氢氧根离子结合生成水分子。</li>
        <li>特点：中和反应一般<strong>放热</strong>，触摸容器可感到温度升高。</li>
        <li>应用：改良酸性土壤、处理工业废水、胃药缓解胃酸过多等。</li>
      </ul>
    </div>
  </div>
</template>

        <div class="beaker"><div class="beaker-liquid" id="liq"></div></div>
        <div class="ph-badge" id="ph-val">pH = 7</div>

      </div>

    <div class="toolbar">
      <button class="btn" id="btn-acid" type="button">加入酸</button>

    </div>

  </div>
  <script>
  (function(){
    var mode = 'neutral';
    var colors = { acid:'#e74c3c', base:'#2980b9', neutral:'#27ae60' };
    var ph = { acid:'pH ≈ 2', base:'pH ≈ 12', neutral:'pH = 7' };
    var labels = { acid:'酸性溶液（石蕊变红）', base:'碱性溶液（石蕊变蓝）', neutral:'中性溶液' };
    function render(){
      var liq = document.getElementById('liq');
      var phEl = document.getElementById('ph-val');
      var lab = document.getElementById('status-lab');
      if(liq){ liq.style.background = colors[mode]; }
      if(phEl){ phEl.textContent = ph[mode]; }
      if(lab){ lab.textContent = labels[mode]; }
      ['btn-acid','btn-base','btn-neu'].forEach(function(id){
        var b = document.getElementById(id);
        if(b) b.classList.toggle('active', (id==='btn-acid'&&mode==='acid')||(id==='btn-base'&&mode==='base')||(id==='btn-neu'&&mode==='neutral'));
      });
    }
    function save(){ window.parent.postMessage({type:'saveState',state:{mode:mode}},'*'); }
    function restore(s){ if(s&&s.mode){ mode=s.mode; render(); } }
    window.addEventListener('message',function(e){ if(e.data&&e.data.type==='restoreState') restore(e.data.state); });
    window.addEventListener('DOMContentLoaded',function(){
      document.getElementById('btn-acid').onclick=function(){ mode='acid'; render(); save(); };
      document.getElementById('btn-base').onclick=function(){ mode='base'; render(); save(); };
      document.getElementById('btn-neu').onclick=function(){ mode='neutral'; render(); save(); };
      render();
    });
  })();
  </script>
</template>

<!-- P7 例题 -->
<template class="page-data" data-id="7" data-name="例题精讲">
  <div class="page-container">
    <p class="eyebrow">例题</p>
    <h2 class="page-title">计算中和所需 NaOH</h2>
    <div class="card card-white fill" style="overflow:hidden">
      <p style="margin:0 0 8px;font-size:15px"><strong>题：</strong>现有 10 g 溶质质量分数为 10% 的盐酸，欲恰好中和，需氢氧化钠固体多少克？（HCl 36.5，NaOH 40）</p>
      <div id="step0" class="tip" style="margin-top:8px">点击「下一步」查看解题过程。</div>
      <div id="step1" style="display:none;margin-top:8px" class="card">
        <strong>解①</strong> m(HCl) = 10 g × 10% = <strong>1 g</strong>
      </div>
      <div id="step2" style="display:none;margin-top:8px" class="card">
        <strong>解②</strong> HCl + NaOH → NaCl + H₂O<br>
        36.5 g HCl ～ 40 g NaOH<br>
        1 g HCl ～ x g NaOH
      </div>
      <div id="step3" style="display:none;margin-top:8px" class="tip ok">
        <strong>解③</strong> x = 1 × 40 ÷ 36.5 ≈ <strong>1.1 g</strong><br>
        答：需氢氧化钠固体约 1.1 g。
      </div>
    </div>
    <div class="toolbar"><button class="btn btn-primary" id="btn-next" type="button">下一步</button></div>
  </div>
  <script>
  (function(){
    var step = 0;
    var steps = ['step0','step1','step2','step3'];
    function show(){
      steps.forEach(function(id,i){ var el=document.getElementById(id); if(el) el.style.display=(i<=step)?'block':'none'; });
      var btn = document.getElementById('btn-next');
      if(btn){ btn.textContent = step>=3 ? '完成' : '下一步'; btn.disabled = step>=3; }
    }
    function save(){ window.parent.postMessage({type:'saveState',state:{step:step}},'*'); }
    function restore(s){ if(s&&typeof s.step==='number'){ step=s.step; show(); } }
    window.addEventListener('message',function(e){ if(e.data&&e.data.type==='restoreState') restore(e.data.state); });
    window.addEventListener('DOMContentLoaded',function(){
      document.getElementById('btn-next').onclick=function(){
        if(step<3){ step++; show(); save(); }
      };
      show();
    });
  })();
  </script>
</template>

      { stem:'下列物质可用作中和胃酸的是？', options:[{k:'A',text:'盐酸'},{k:'B',text:'氢氧化钠'},{k:'C',text:'氢氧化铝'},{k:'D',text:'硫酸'}], ans:'C', explain:'氢氧化铝能与胃酸（盐酸）发生中和反应，且刺激性较小，常用于胃药。' },
      { stem:'紫色石蕊遇碱性溶液变？', options:[{k:'A',text:'红色'},{k:'B',text:'蓝色'},{k:'C',text:'无色'},{k:'D',text:'黄色'}], ans:'B', explain:'紫色石蕊遇酸变红，遇碱变蓝。' },
      { stem:'酸与碱反应的一般通式是？', options:[{k:'A',text:'酸+碱→盐+水'},{k:'B',text:'酸+碱→盐+氢气'},{k:'C',text:'酸+碱→碱+酸'},{k:'D',text:'酸+碱→沉淀'}], ans:'A', explain:'中和反应生成盐和水的通式：酸 + 碱 → 盐 + 水。' },
      { stem:'中和反应通常伴随？', options:[{k:'A',text:'吸热'},{k:'B',text:'放热'},{k:'C',text:'无热量变化'},{k:'D',text:'产生沉淀'}], ans:'B', explain:'中和反应一般放热，实验时可感到试管温度升高。' }
    ];
    var state = { phase:'quiz', index:0, answers:{}, revealed:{} };
    function el(id){ return document.getElementById(id); }
    function save(){ window.parent.postMessage({type:'saveState',state:JSON.parse(JSON.stringify(state))},'*'); }
    function sendScore(){
      var ok=0; QUESTIONS.forEach(function(q,i){ if(state.answers[i]===q.ans) ok++; });
      window.parent.postMessage({type:'cwScore',id:(window.__CW_PAGE__&&window.__CW_PAGE__.id)||8,raw:ok,max:QUESTIONS.length},'*');
    }
    function render(){
      if(state.phase==='result'){
        el('quiz-view').style.display='none';
        el('result-view').style.display='flex';
        var ok=0; QUESTIONS.forEach(function(q,i){ if(state.answers[i]===q.ans) ok++; });
        el('score-text').textContent='得分：'+ok+' / '+QUESTIONS.length;
        sendScore();
        return;
      }
      el('quiz-view').style.display='flex';
      el('result-view').style.display='none';
      var q = QUESTIONS[state.index];
      el('prog').textContent='第 '+(state.index+1)+' / '+QUESTIONS.length+' 题';
      el('stem').textContent=q.stem;
      var opts=''; q.options.forEach(function(o){
        var sel=state.answers[state.index]===o.k;
        var rev=state.revealed[state.index];
        var cls='opt'+(sel?' sel':'');
        if(rev){ if(o.k===q.ans) cls+=' correct'; else if(sel) cls+=' wrong'; }
        opts+='<button type="button" class="'+cls+'" data-k="'+o.k+'">'+o.k+'. '+o.text+'</button>';
      });
      el('opts').innerHTML=opts;
      el('opts').querySelectorAll('.opt').forEach(function(btn){
        if(state.revealed[state.index]) return;
        btn.onclick=function(){
          state.answers[state.index]=btn.getAttribute('data-k');
          render(); save();
        };
      });
      var revealed=!!state.revealed[state.index];
      el('explain').style.display=revealed?'block':'none';
      el('explain').textContent=revealed?(state.answers[state.index]===q.ans?'✓ 正确。':'✗ 再想想。')+q.explain:'';
      el('explain').className='tip '+(revealed?(state.answers[state.index]===q.ans?'ok':'err'):'');
      el('btn-confirm').disabled=!state.answers[state.index]||revealed;
      el('btn-prev').disabled=state.index===0;
      el('btn-next').textContent=state.index===QUESTIONS.length-1?(revealed?'查看结果':'下一题'):'下一题';
      el('btn-next').disabled=!revealed;
    }
    function restore(s){
      if(!s) return;
      state=Object.assign(state,s);
      render();
    }
    window.addEventListener('message',function(e){ if(e.data&&e.data.type==='restoreState') restore(e.data.state); });
    window.addEventListener('DOMContentLoaded',function(){
      el('btn-confirm').onclick=function(){
        if(!state.answers[state.index]) return;
        state.revealed[state.index]=true;
        render(); save();
      };
      el('btn-prev').onclick=function(){
        if(state.index>0){ state.index--; render(); save(); }
      };
      el('btn-next').onclick=function(){
        if(!state.revealed[state.index]) return;
        if(state.index<QUESTIONS.length-1){ state.index++; render(); save(); }
        else { state.phase='result'; render(); save(); }
      };
      el('btn-redo').onclick=function(){
        state={phase:'quiz',index:0,answers:{},revealed:{}};
        render(); save();
      };
      render();
    });
  })();
  </script>
</template>
