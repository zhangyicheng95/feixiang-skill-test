<template class="page-data" data-id="3" data-name="内能的概念">
  <style>
    .dual { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .dual .fx-block { text-align: center; }
    .fx-block--a { background: var(--fx-a); border-color: var(--primary); color: var(--primary); }
    .fx-block--b { background: var(--fx-b); border-color: var(--accent); color: #fff; }
  </style>
  <div class="page-container">
    <div class="page-title">讲解：内能的概念</div>
    <div class="card" style="font-size:16px;font-weight:700;color:var(--accent);text-align:center;">
      内能 = 物体内所有分子热运动的动能与分子势能的总和
    </div>
    <div class="card">
      <ul class="compact">
        <li><span class="tag-pill">定义</span> 一切物体都具有内能，<strong>温度越高</strong>，分子运动越剧烈，内能<strong>越大</strong></li>
        <li><span class="tag-pill">单位</span> 焦耳（J），与功、热量的单位相同</li>
        <li><span class="tag-pill">易错</span> 0℃ 的物体仍有内能；内能不能用「有无」描述，只能说「大小」</li>
      </ul>
    </div>
    <p style="margin:0 0 8px;font-size:14px;font-weight:700;">改变内能的两种方式（等效）：</p>
    <div class="dual">
      <div class="fx-block fx-block--a">做功<br><small style="font-weight:400;">如摩擦生热、压缩气体</small></div>
      <div class="fx-block fx-block--b">热传递<br><small style="font-weight:400;">如加热、冷却</small></div>
    </div>
    <div class="tip" style="margin-top:10px;"><strong>记忆要点：</strong>做功和热传递在改变内能上是等效的，但做功是能量转化，热传递是能量转移。</div>
  </div>
</template>

<!-- P4 热量与比热容 -->
<template class="page-data" data-id="4" data-name="热量与比热容">
  <style>
    .formula {
      text-align: center; font-size: 22px; font-weight: 800; color: var(--primary);
      padding: 14px; background: var(--demo-bg); border: 2px solid var(--demo-border);
      border-radius: var(--radius); margin-bottom: 10px;
      background-image: linear-gradient(var(--demo-grid) 1px, transparent 1px),

      background-size: 30px 30px;
    }
  </style>
  <div class="page-container">
    <div class="page-title">讲解：热量与比热容</div>
    <div class="formula">Q = cmΔt</div>
    <div class="card">
      <ul class="compact">
        <li><strong>Q</strong> — 吸收或放出的热量（J）</li>
        <li><strong>c</strong> — 比热容，物质的一种<strong>特性</strong>（J/(kg·℃)）</li>
        <li><strong>m</strong> — 质量（kg）；<strong>Δt</strong> — 温度变化量（℃）</li>
      </ul>
    </div>
    <div class="card">
      <p style="margin:0 0 6px;font-weight:700;color:var(--accent);">水的比热容较大：c<sub>水</sub> ≈ 4.2×10³ J/(kg·℃)</p>
      <ul class="compact">
        <li>相同质量的水和其他物质升高相同温度，水吸收的热量更多</li>
        <li>应用：用水做冷却剂、沿海地区昼夜温差小</li>
      </ul>
    </div>
    <div class="tip"><strong>辨析：</strong>热量是过程量，只能说物体「吸收」或「放出」热量，不能说物体「含有」热量。</div>
  </div>
</template>

<!-- P7 例题 -->
<template class="page-data" data-id="7" data-name="热量计算例题">
  <style>
    .step { font-size: 14px; line-height: 1.65; margin-bottom: 8px; padding-left: 12px; border-left: 4px solid var(--accent); }
  </style>
  <div class="page-container">
    <div class="page-title">例题精讲：热量计算</div>
    <div class="card">
      <p style="margin:0 0 8px;font-weight:700;">题目：</p>
      <p style="margin:0;font-size:15px;">将 2 kg 的水从 20℃ 加热到 80℃，已知 c<sub>水</sub> = 4.2×10³ J/(kg·℃)，求水吸收的热量。</p>
    </div>
    <div class="card">
      <p style="margin:0 0 8px;font-weight:700;">解答过程：</p>
      <div class="step"><strong>已知</strong> m = 2 kg，t₁ = 20℃，t₂ = 80℃，c = 4.2×10³ J/(kg·℃)</div>
      <div class="step"><strong>求</strong> Q<sub>吸</sub></div>
      <div class="step"><strong>解</strong> Δt = t₂ − t₁ = 80℃ − 20℃ = 60℃</div>
      <div class="step">Q<sub>吸</sub> = cmΔt = 4.2×10³ × 2 × 60 = <strong>5.04×10⁵ J</strong></div>
    </div>
    <div class="tip"><strong>答：</strong>水吸收的热量为 5.04×10⁵ J。注意 Δt 是温度变化量，不是末温度。</div>
  </div>
</template>

  <style>

    }

    #dragMsg { flex: 1; font-size: 14px; font-weight: 600; color: var(--primary); }
  </style>
  <div class="page-container">
    <div class="page-title">练习：拖拽分类</div>
    <p style="margin:0 0 8px;font-size:14px;">将概念或现象拖入对应栏目，完成后点「检查答案」。</p>
    <div class="drag-area">
      <div class="pool" id="chipPool" data-interactive>
        <div class="pool-title">词卡</div>
      </div>
      <div class="drop-col">
        <div class="drop-zone" data-zone="energy" data-interactive><h4>内能</h4></div>
        <div class="drop-zone" data-zone="engine" data-interactive><h4>热机</h4></div>
        <div class="drop-zone" data-zone="circuit" data-interactive><h4>电路</h4></div>
      </div>
    </div>
    <div class="drag-foot">
      <span id="dragMsg">请把 6 张词卡全部拖入栏中</span>
      <button type="button" class="btn btn-2nd" id="dragReset" data-interactive>重置</button>
      <button type="button" class="btn btn-primary" id="dragCheck" data-interactive>检查答案</button>
    </div>
    <div class="tip" style="margin-top:6px;font-size:13px;">
      <strong>解析：</strong>摩擦生热、给水加热属于内能；做功冲程、热机效率属于热机；串联电路、欧姆定律属于电路。
    </div>
  </div>
  <script>
    (function () {
      var ITEMS = [
        { id: 'a', text: '摩擦生热', ans: 'energy' },
        { id: 'b', text: '给水加热', ans: 'energy' },
        { id: 'c', text: '做功冲程', ans: 'engine' },
        { id: 'd', text: '热机效率', ans: 'engine' },
        { id: 'e', text: '串联电路', ans: 'circuit' },
        { id: 'f', text: '欧姆定律', ans: 'circuit' }
      ];
      var pool = document.getElementById('chipPool');
      var msg = document.getElementById('dragMsg');
      var checked = false;
      var dragEl = null, ox = 0, oy = 0;

      function save() {
        var placement = {};
        document.querySelectorAll('.chip').forEach(function (c) {
          var p = c.parentElement;
          var z = p && p.dataset.zone ? p.dataset.zone : 'pool';
          placement[c.dataset.id] = z;
        });
        window.parent.postMessage({ type: 'saveState', state: { placement: placement, checked: checked } }, '*');
      }

      function makeChip(item) {
        var el = document.createElement('div');
        el.className = 'chip';
        el.textContent = item.text;
        el.dataset.id = item.id;
        el.dataset.ans = item.ans;
        el.addEventListener('mousedown', startDrag);
        el.addEventListener('touchstart', startDrag, { passive: false });
        return el;
      }

      function startDrag(e) {
        if (checked) return;
        e.preventDefault();
        dragEl = e.currentTarget;
        dragEl.classList.add('dragging');
        var r = dragEl.getBoundingClientRect();
        var cx = e.touches ? e.touches[0].clientX : e.clientX;
        var cy = e.touches ? e.touches[0].clientY : e.clientY;
        ox = cx - r.left; oy = cy - r.top;
        dragEl.style.position = 'fixed';
        dragEl.style.zIndex = '9999';
        dragEl.style.width = r.width + 'px';
        moveDrag(cx, cy);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', endDrag);
      }

      function onMove(e) {
        if (!dragEl) return;
        e.preventDefault();
        var cx = e.touches ? e.touches[0].clientX : e.clientX;
        var cy = e.touches ? e.touches[0].clientY : e.clientY;
        moveDrag(cx, cy);
        document.querySelectorAll('.drop-zone').forEach(function (z) {
          var rect = z.getBoundingClientRect();
          if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) z.classList.add('over');
          else z.classList.remove('over');
        });
      }

      function moveDrag(cx, cy) {
        dragEl.style.left = (cx - ox) + 'px';
        dragEl.style.top = (cy - oy) + 'px';
      }

      function endDrag(e) {
        if (!dragEl) return;
        var cx = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
        var cy = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
        var target = null;
        document.querySelectorAll('.drop-zone').forEach(function (z) {
          z.classList.remove('over');
          var rect = z.getBoundingClientRect();
          if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) target = z;
        });
        dragEl.classList.remove('dragging');
        dragEl.style.position = '';
        dragEl.style.left = '';
        dragEl.style.top = '';
        dragEl.style.zIndex = '';
        dragEl.style.width = '';
        (target || pool).appendChild(dragEl);
        dragEl = null;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', endDrag);
        save();
      }

      function initPool() {
        while (pool.children.length > 1) pool.removeChild(pool.lastChild);
        ITEMS.forEach(function (it) { pool.appendChild(makeChip(it)); });
      }

      function check() {
        var chips = document.querySelectorAll('.chip');
        if (chips.length < 6) { msg.textContent = '请拖完 6 张词卡'; return; }
        var inZone = 0, ok = 0;
        chips.forEach(function (c) {
          var p = c.parentElement;
          if (p && p.dataset.zone) {
            inZone++;
            if (p.dataset.zone === c.dataset.ans) { c.classList.add('correct'); c.classList.remove('wrong'); ok++; }
            else { c.classList.add('wrong'); c.classList.remove('correct'); }
          } else { c.classList.remove('correct', 'wrong'); }
        });
        if (inZone < 6) { msg.textContent = '还有词卡在左侧，请全部拖入栏中'; return; }
        checked = true;
        msg.textContent = ok === 6 ? '全部正确！' : '得分 ' + ok + ' / 6，请根据提示修改';
        save();
      }

      function reset() {
        checked = false;
        msg.textContent = '请把 6 张词卡全部拖入栏中';
        document.querySelectorAll('.drop-zone .chip').forEach(function (c) { pool.appendChild(c); });
        document.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('correct', 'wrong'); });
        save();
      }

      document.getElementById('dragCheck').addEventListener('click', check);
      document.getElementById('dragReset').addEventListener('click', reset);

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state && e.data.state.placement) {
          var pl = e.data.state.placement;
          checked = !!e.data.state.checked;
          Object.keys(pl).forEach(function (id) {
            var chip = document.querySelector('.chip[data-id="' + id + '"]');
            if (!chip) return;
            var zone = pl[id];
            if (zone === 'pool') pool.appendChild(chip);
            else {
              var z = document.querySelector('.drop-zone[data-zone="' + zone + '"]');
              if (z) z.appendChild(chip);
            }
          });
          if (checked) check();
        }
      });

      initPool();
    })();
  </script>
</template>

  <style>

  <div class="page-container quiz-step">

  </div>
  <script>
    (function () {
      var QS = [
        { stem: '1. 改变物体内能的方式有（　）', opts: [['A', '只有做功'], ['B', '只有热传递'], ['C', '做功和热传递']], ans: 'C',
          explain: '<strong>答案 C。</strong>改变内能的方式有两种：做功和热传递，二者等效。' },
        { stem: '2. 下列物质中，比热容较大、常作冷却剂的是（　）', opts: [['A', '铁'], ['B', '水'], ['C', '砂石']], ans: 'B',
          explain: '<strong>答案 B。</strong>水的比热容约为 4.2×10³ J/(kg·℃)，比大多数物质大，吸放热能力强。' },
        { stem: '3. 四冲程汽油机中，将内能转化为机械能的是（　）', opts: [['A', '吸气冲程'], ['B', '压缩冲程'], ['C', '做功冲程']], ans: 'C',
          explain: '<strong>答案 C。</strong>做功冲程中燃气膨胀推动活塞对外做功；压缩冲程是机械能转化为内能。' },
        { stem: '4. 串联电路中，关于电流的说法正确的是（　）', opts: [['A', '各处电流相等'], ['B', '各处电流不等'], ['C', '越靠近电源电流越大']], ans: 'A',
          explain: '<strong>答案 A。</strong>串联电路中电流处处相等：I = I₁ = I₂ = …' },
        { stem: '5. 公式 Q = cmΔt 中，c 表示（　）', opts: [['A', '热量'], ['B', '比热容'], ['C', '温度']], ans: 'B',
          explain: '<strong>答案 B。</strong>c 是比热容，表示单位质量物质升高 1℃ 所吸收的热量，是物质的一种特性。' },
        { stem: '6. 热机效率的计算公式是（　）', opts: [['A', 'η = Q有/Q放 × 100%'], ['B', 'η = Q放/Q有 × 100%'], ['C', 'η = W/m']], ans: 'A',
          explain: '<strong>答案 A。</strong>热机效率 = 有用功（或有用热量）与燃料完全燃烧放出的热量之比。' }
      ];
      var idx = 0, phase = 'quiz', answers = {}, revealed = {};
      var stage = document.getElementById('scStage');
      var idxEl = document.getElementById('scIdx');
      var bar = document.getElementById('scBar');
      var msg = document.getElementById('scMsg');
      var btnPrev = document.getElementById('scPrev');
      var btnNext = document.getElementById('scNext');

      function save() {
        window.parent.postMessage({ type: 'saveState', state: { idx: idx, phase: phase, answers: answers, revealed: revealed } }, '*');
      }

      function updateNextBtn() {
        if (revealed[idx]) {
          btnNext.textContent = idx === QS.length - 1 ? '查看结果' : '下一题';
        } else {
          btnNext.textContent = '确认答案';
        }
        btnNext.disabled = !answers[idx];
      }

      function showExplain(q, isOk) {
        var box = document.createElement('div');
        box.className = 'explain ' + (isOk ? 'ok' : 'no');
        box.innerHTML = (isOk ? '回答正确。' : '回答错误。') + ' ' + q.explain;
        stage.appendChild(box);
      }

      function applyReveal(q) {
        stage.querySelectorAll('.opt').forEach(function (b) {
          b.disabled = true;
          var v = b.dataset.v;
          b.classList.remove('picked');
          if (v === q.ans) b.classList.add('correct');
          else if (v === answers[idx]) b.classList.add('wrong');
        });
        showExplain(q, answers[idx] === q.ans);
        msg.textContent = answers[idx] === q.ans ? '回答正确，可点下一题' : '请看解析，可点下一题';
        updateNextBtn();
      }

      function renderQuiz() {
        btnPrev.style.display = idx > 0 ? '' : 'none';
        idxEl.textContent = String(idx + 1);
        bar.style.width = ((idx + 1) / QS.length * 100) + '%';
        var q = QS[idx];
        var isRev = !!revealed[idx];
        stage.innerHTML = '<p class="q">' + q.stem + '</p>';
        q.opts.forEach(function (o) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'opt';
          b.textContent = o[0] + '. ' + o[1];
          b.dataset.v = o[0];
          if (answers[idx] === o[0] && !isRev) b.classList.add('picked');
          if (!isRev) {
            b.addEventListener('click', function () {
              answers[idx] = o[0];
              stage.querySelectorAll('.opt').forEach(function (x) { x.classList.remove('picked'); });
              b.classList.add('picked');
              btnNext.disabled = false;
              msg.textContent = '已选择 ' + o[0] + '，请点确认答案';
              save();
            });
          }
          stage.appendChild(b);
        });
        if (isRev) applyReveal(q);
        else {
          msg.textContent = answers[idx] ? '已选择，请点确认答案' : '请选择答案';
          updateNextBtn();
        }
        save();
      }

      function score() {
        var ok = 0;
        for (var i = 0; i < QS.length; i++) if (answers[i] === QS[i].ans) ok++;
        return ok;
      }

      function renderResult() {
        stage.innerHTML = '';
        var ok = score();
        window.parent.postMessage({ type: 'cwScore', id: (window.__CW_PAGE__ && window.__CW_PAGE__.id) || 9, raw: ok, max: QS.length }, '*');
        var box = document.createElement('div');
        box.className = 'result';
        box.innerHTML =
          '<p style="margin:0;font-size:16px;">答题完成</p>' +
          '<p class="score">' + ok + ' / ' + QS.length + '</p>' +
          '<p style="margin:0;font-size:14px;line-height:1.6;">' +
          (ok >= 4 ? '很棒！内能、热机与电路核心知识掌握不错。' : '建议回顾 Q=cmΔt、热机冲程与欧姆定律。') +
          '</p>' +
          '<button type="button" class="btn btn-primary" id="scRetry" style="margin-top:14px;">重新作答</button>';
        stage.appendChild(box);
        btnPrev.style.display = 'none';
        btnNext.style.display = 'none';
        msg.textContent = '可点「重新作答」再练一遍';
        document.getElementById('scRetry').addEventListener('click', reset);
        save();
      }

      function reset() {
        idx = 0; phase = 'quiz'; answers = {}; revealed = {};
        btnNext.style.display = '';
        renderQuiz();
      }

      btnPrev.addEventListener('click', function () {
        if (phase !== 'quiz' || idx <= 0) return;
        idx--;
        renderQuiz();
      });

      btnNext.addEventListener('click', function () {
        if (phase !== 'quiz' || !answers[idx]) return;
        if (!revealed[idx]) {
          revealed[idx] = true;
          applyReveal(QS[idx]);
          save();
          return;
        }
        if (idx < QS.length - 1) {
          idx++;
          renderQuiz();
        } else {
          phase = 'result';
          renderResult();
        }
      });

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state) {
          idx = e.data.state.idx || 0;
          phase = e.data.state.phase || 'quiz';
          answers = e.data.state.answers || {};
          revealed = e.data.state.revealed || {};
          if (phase === 'result') renderResult();
          else renderQuiz();
        }
      });

      renderQuiz();
    })();
  </script>
</template>

  <script>
    (function () {
      var CORRECT = { B: true, C: true, D: true, E: true };
      var picked = {};
      var done = false;
      var msg = document.getElementById('mcMsg');
      function countPicked() {
        return Object.keys(picked).filter(function (k) { return picked[k]; }).length;
      }
      function save() {
        window.parent.postMessage({ type: 'saveState', state: { picked: picked, done: done } }, '*');
      }
      function updateMsg() {
        if (done) return;
        var n = countPicked();
        msg.textContent = '已选 ' + n + ' 项，请至少选 2 项再提交';
      }
      document.querySelectorAll('.mc-opt').forEach(function (b) {
        b.addEventListener('click', function () {
          if (done) return;
          var v = b.dataset.v;
          picked[v] = !picked[v];
          b.classList.toggle('picked', !!picked[v]);
          updateMsg(); save();
        });
      });
      function grade() {
        var n = countPicked();
        if (n < 2) { msg.textContent = '多选题请至少选择 2 项'; return; }

        var ok = 0, total = 4;
        document.querySelectorAll('.mc-opt').forEach(function (b) {
          b.disabled = true;
          var v = b.dataset.v;
          var should = !!CORRECT[v];
          var isOn = !!picked[v];
          b.classList.remove('picked', 'correct', 'wrong', 'missed');
          if (should && isOn) { b.classList.add('correct'); ok++; }
          else if (should && !isOn) { b.classList.add('missed'); }
          else if (!should && isOn) { b.classList.add('wrong'); }
        });
        msg.textContent = ok === total ? '全部正确！B、C、D、E 均为正确表述' : '正确 ' + ok + '/' + total + '，绿框为应选项';

        window.parent.postMessage({ type: 'cwScore', id: (window.__CW_PAGE__ && window.__CW_PAGE__.id) || 10, raw: ok, max: total }, '*');
        save();
      }
      document.getElementById('mcSubmit').addEventListener('click', grade);
      document.getElementById('mcReset').addEventListener('click', function () {
        done = false; picked = {};
        document.querySelectorAll('.mc-opt').forEach(function (b) {
          b.disabled = false; b.classList.remove('picked', 'correct', 'wrong', 'missed');

          done = !!e.data.state.done;
