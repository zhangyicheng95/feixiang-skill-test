    .stem { font-size: 17px; line-height: 1.5; margin: 6px 0 10px; }
    .opts { display: flex; flex-direction: column; gap: 8px; }
    .opt { border: 2px solid var(--card-border); border-radius: var(--radius); padding: 9px 14px; font-size: 15px; cursor: pointer; background: var(--paper); display: flex; gap: 10px; }
    .opt .k { font-weight: 700; color: var(--ink-soft); font-family: var(--cw-courseware-latin-accent-font); }
    .opt.sel { border-color: var(--ink); background: #fff; }
    .opt.right { border-color: var(--success); background: #eef7f0; }
    .opt.wrong { border-color: var(--error); background: #f9eeee; }
    .exp { margin-top: 10px; display: none; }
    .nav { margin-top: auto; display: flex; gap: 10px; justify-content: flex-end; padding-top: 10px; }
    .result { text-align: center; padding-top: 30px; }
    .result .score { font-size: 40px; font-weight: 800; color: var(--gold-deep); font-family: var(--cw-courseware-latin-accent-font); }
  </style>
  <div class="page-container">
    <h2 class="page-title">课堂练习 · 单选</h2>
    <div class="qwrap" id="q9"></div>
  </div>
  <script>
    (function () {
      var QS = [
        { stem: '《水调歌头·明月几时有》的作者是（　）', options: [{k:'A',t:'李白'},{k:'B',t:'苏轼'},{k:'C',t:'辛弃疾'},{k:'D',t:'李清照'}], ans: 'B', exp: '苏轼，北宋文学家，字子瞻，号东坡居士，豪放派代表。' },
        { stem: '"把酒问青天"中"把"的意思是（　）', options: [{k:'A',t:'拿、端起'},{k:'B',t:'把握'},{k:'C',t:'阻挡'},{k:'D',t:'将（介词）'}], ans: 'A', exp: '"把酒"即端起酒杯。' },
        { stem: '"此事古难全"中的"此事"指（　）', options: [{k:'A',t:'天气阴晴'},{k:'B',t:'人的悲欢离合与月的阴晴圆缺'},{k:'C',t:'仕途升迁'},{k:'D',t:'填词作赋'}], ans: 'B', exp: '承上句"人有悲欢离合，月有阴晴圆缺"。' },
        { stem: '全词结尾流露的主要情感是（　）', options: [{k:'A',t:'悲观绝望'},{k:'B',t:'愤世嫉俗'},{k:'C',t:'旷达与美好祝愿'},{k:'D',t:'及时行乐'}], ans: 'C', exp: '由苦闷转向旷达，以"但愿人长久"的祝愿收束。' },
        { stem: '本词最突出的写法是（　）', options: [{k:'A',t:'借月抒怀、情景交融'},{k:'B',t:'直抒胸臆、全无写景'},{k:'C',t:'大量用典堆砌'},{k:'D',t:'白描叙事'}], ans: 'A', exp: '以明月贯穿全篇，由景入情、由情入理。' }
      ];
      var idx = 0, phase = 'quiz', answers = {}, revealed = {}, reported = false;
      var box = document.getElementById('q9');

      function save() { window.parent.postMessage({ type: 'saveState', state: { idx: idx, phase: phase, answers: answers, revealed: revealed } }, '*'); }
      function score() { var ok = 0; QS.forEach(function (q, i) { if (answers[i] === q.ans) ok++; }); return ok; }

      function render() {
        if (phase === 'result') return renderResult();
        var q = QS[idx];
        var pct = Math.round((idx) / QS.length * 100);
        var h = '<div class="qbar"><span class="prog">第 ' + (idx + 1) + ' / ' + QS.length + ' 题</span><span class="bar"><i style="width:' + pct + '%"></i></span></div>';
        h += '<div class="stem">' + q.stem + '</div><div class="opts">';
        q.options.forEach(function (o) { h += '<div class="opt" data-k="' + o.k + '"><span class="k">' + o.k + '</span><span>' + o.t + '</span></div>'; });
        h += '</div><div class="exp tip" id="exp9"></div>';
        h += '<div class="nav"><button class="btn" id="prev9">上一题</button><button class="btn btn-primary" id="confirm9">确认答案</button><button class="btn btn-gold" id="next9" style="display:none">' + (idx === QS.length - 1 ? '查看结果' : '下一题') + '</button></div>';
        box.innerHTML = h;

        var picked = answers[idx], done = revealed[idx];
        Array.prototype.forEach.call(box.querySelectorAll('.opt'), function (el) {
          var k = el.dataset.k;
          if (picked === k) el.classList.add('sel');
          el.addEventListener('click', function () {
            if (revealed[idx]) return;
            answers[idx] = k;
            Array.prototype.forEach.call(box.querySelectorAll('.opt'), function (x) { x.classList.remove('sel'); });
            el.classList.add('sel');
            box.querySelector('#confirm9').disabled = false;
            save();
          });
        });
        box.querySelector('#confirm9').disabled = !picked;
        box.querySelector('#prev9').style.display = idx === 0 ? 'none' : '';
        box.querySelector('#prev9').addEventListener('click', function () { if (idx > 0) { idx--; save(); render(); } });
        box.querySelector('#confirm9').addEventListener('click', function () { revealed[idx] = true; save(); reveal(); });
        box.querySelector('#next9').addEventListener('click', function () {
          if (idx === QS.length - 1) { phase = 'result'; save(); renderResult(); }
          else { idx++; save(); render(); }
        });
        if (done) reveal();
      }

      function reveal() {
        var q = QS[idx];
        Array.prototype.forEach.call(box.querySelectorAll('.opt'), function (el) {
          var k = el.dataset.k; el.style.cursor = 'default';
          if (k === q.ans) el.classList.add('right');
          else if (k === answers[idx]) el.classList.add('wrong');
        });
        var exp = box.querySelector('#exp9');
        exp.style.display = 'block';
        exp.innerHTML = (answers[idx] === q.ans ? '<b style="color:var(--success)">答对了！</b> ' : '<b style="color:var(--error)">正确答案：' + q.ans + '</b> ') + q.exp;
        box.querySelector('#confirm9').style.display = 'none';
        box.querySelector('#next9').style.display = '';
      }

      function renderResult() {
        var ok = score();
        if (!reported) { reported = true; }
        window.parent.postMessage({ type: 'cwScore', id: (window.__CW_PAGE__ && window.__CW_PAGE__.id) || 9, raw: ok, max: QS.length }, '*');
        box.innerHTML = '<div class="result"><div class="score">' + ok + ' / ' + QS.length + '</div>' +
          '<p style="font-size:16px;margin:10px 0 18px">' + (ok === QS.length ? '全部答对，理解到位！' : (ok >= 3 ? '不错，回看解析巩固薄弱题。' : '再读原文与注释，重做一次吧。')) + '</p>' +
          '<button class="btn btn-primary" id="redo9">重新作答</button></div>';
        box.querySelector('#redo9').addEventListener('click', function () {
          idx = 0; phase = 'quiz'; answers = {}; revealed = {}; reported = false; save(); render();
        });
      }

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state) {
          idx = e.data.state.idx || 0; phase = e.data.state.phase || 'quiz';
          answers = e.data.state.answers || {}; revealed = e.data.state.revealed || {};
          render();
        }
      });
      render();
    })();
  </script>
</template>

<!-- P10 多选题（提交判分 + cwScore id=10） -->
<template class="page-data" data-id="10" data-name="多选练习">
  <style>
    .mc-stem { font-size: 17px; line-height: 1.5; margin: 4px 0 10px; }
    .mc-opts { display: flex; flex-direction: column; gap: 8px; }
    .mc-opt { border: 2px solid var(--card-border); border-radius: var(--radius); padding: 9px 14px; font-size: 15px; cursor: pointer; background: var(--paper); display: flex; gap: 10px; align-items: flex-start; }
    .mc-opt .k { font-weight: 700; color: var(--ink-soft); font-family: var(--cw-courseware-latin-accent-font); }
    .mc-opt.sel { border-color: var(--ink); background: #fff; }
    .mc-opt.right { border-color: var(--success); background: #eef7f0; }
    .mc-opt.miss { border-color: var(--gold-deep); background: #fbf3e2; }
    .mc-opt.wrong { border-color: var(--error); background: #f9eeee; }
    .mc-nav { margin-top: 12px; display: flex; gap: 10px; justify-content: flex-end; }
    #mcExp { display: none; margin-top: 10px; }
  </style>
  <div class="page-container">
    <h2 class="page-title">课堂练习 · 多选</h2>
    <div class="mc-stem">关于《水调歌头·明月几时有》，下列表述<b>正确</b>的有（多选）：</div>
    <div class="mc-opts" id="mc10"></div>
    <div id="mcExp" class="tip"></div>
    <div class="mc-nav">
      <button class="btn btn-primary" id="mcSubmit" disabled>提交</button>
      <button class="btn" id="mcRedo" style="display:none">重做</button>
    </div>
  </div>
  <script>
    (function () {
      var OPTS = [
        { k: 'A', t: '这是一首中秋词，作于丙辰中秋，兼怀弟弟子由', ok: true },
        { k: 'B', t: '"婵娟"在词中指美好的明月（月光）', ok: true },
        { k: 'C', t: '全词情感由旷达开始、以悲观告终', ok: false },
        { k: 'D', t: '"起舞弄清影，何似在人间"流露对人间生活的留恋', ok: true },
        { k: 'E', t: '苏轼是南宋豪放派词人', ok: false }
      ];
      var picked = {}, done = false, box = document.getElementById('mc10');
      var expBox = document.getElementById('mcExp'), submit = document.getElementById('mcSubmit'), redo = document.getElementById('mcRedo');

      function draw() {
        box.innerHTML = '';
        OPTS.forEach(function (o) {
          var el = document.createElement('div'); el.className = 'mc-opt'; el.dataset.k = o.k;
          el.innerHTML = '<span class="k">' + o.k + '</span><span>' + o.t + '</span>';
          if (picked[o.k]) el.classList.add('sel');
          el.addEventListener('click', function () {
            if (done) return;
            picked[o.k] = !picked[o.k]; el.classList.toggle('sel');
            submit.disabled = Object.keys(picked).filter(function (k) { return picked[k]; }).length === 0;
            save();
          });
          box.appendChild(el);
        });
      }
      function save() { window.parent.postMessage({ type: 'saveState', state: { picked: picked, done: done } }, '*'); }

      function grade() {
        done = true; var ok = 0, total = 0;
        OPTS.forEach(function (o) { if (o.ok) total++; });
        Array.prototype.forEach.call(box.querySelectorAll('.mc-opt'), function (el) {
          var k = el.dataset.k, o = OPTS.filter(function (x) { return x.k === k; })[0];
          el.style.cursor = 'default';
          if (o.ok && picked[k]) { el.classList.add('right'); ok++; }
          else if (o.ok && !picked[k]) el.classList.add('miss');
          else if (!o.ok && picked[k]) el.classList.add('wrong');
        });
        expBox.style.display = 'block';
        expBox.innerHTML = '<b>应选 A、B、D。</b> C 错：情感由苦闷转向旷达；E 错：苏轼是<b>北宋</b>词人。你答对应选项 ' + ok + ' / ' + total + ' 项。';
        submit.style.display = 'none'; redo.style.display = '';
        window.parent.postMessage({ type: 'cwScore', id: (window.__CW_PAGE__ && window.__CW_PAGE__.id) || 10, raw: ok, max: total }, '*');
        save();
      }

      submit.addEventListener('click', grade);
      redo.addEventListener('click', function () { picked = {}; done = false; expBox.style.display = 'none'; submit.style.display = ''; submit.disabled = true; redo.style.display = 'none'; draw(); save(); });

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state) {
          picked = e.data.state.picked || {}; done = !!e.data.state.done;
          draw();
          submit.disabled = Object.keys(picked).filter(function (k) { return picked[k]; }).length === 0;
          if (done) grade();
        }
      });
      draw();
    })();
  </script>
</template>
