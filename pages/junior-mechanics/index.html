<!DOCTYPE html>

<template class="page-shared">
  <style>
    :root {
      --bg: #FFFFFF;
      --text: #00404D;
      --primary: #00404D;
      --accent: #137F8B;
      --card: #D3F6F4;
      --card-border: rgba(0, 64, 77, 0.30);

      --demo-border: #93BFC2;
      --demo-grid: #DBF1F0;
      --btn-bg: #00404D;
      --btn-fg: #FFFFFF;
      --btn-2nd-bg: #ECFCFB;
      --btn-2nd-fg: #00404D;

      --error: #DF9012;
      --radius: 0px;
      --font: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      --canvas-bg: #eef1f5;
      --stage-base: #eef1f5;
      /* --bg 为白，用 card 青绿着色 */
      --canvas-bg: color-mix(in srgb, var(--card) 42%, var(--stage-base) 58%);
    }
    html, body {
      font-family: var(--font);
      color: var(--text);
      background: var(--canvas-bg);
      margin: 0;
    }
    .page-container {
      height: 100%;
      max-height: 100%;
      min-height: 0;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow-y: auto;
      background: var(--canvas-bg);
    }
    .page-title {
      font-size: 30px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 18px;
      padding-left: 14px;
      border-left: 6px solid var(--primary);
      line-height: 1.2;
      flex-shrink: 0;
    }
    .card {
      background: var(--card);
      border: 2px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .btn {
      padding: 10px 18px;

    }

      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.6;
    }
    .demo-stage {
      background: var(--demo-bg);
      border: 2px solid var(--demo-border);
      background-image:

        linear-gradient(90deg, var(--demo-grid) 1px, transparent 1px);

  <style>

    .force-card .brief { margin: 0; font-size: 14px; line-height: 1.5; }

  </style>
  <div class="page-container">
    <div class="page-title">三种常见力</div>
    <p style="margin:0 0 10px;font-size:15px;">点击卡片查看要点：</p>
    <div class="force-grid">
      <div class="card force-card" data-interactive data-key="g">
        <h4>重力 G</h4>
        <p class="brief">地球吸引</p>
      </div>
      <div class="card force-card" data-interactive data-key="e">
        <h4>弹力 N</h4>
        <p class="brief">形变产生</p>
      </div>
      <div class="card force-card" data-interactive data-key="f">
        <h4>摩擦力 f</h4>
        <p class="brief">阻碍运动</p>
      </div>
    </div>
    <div class="card detail" id="forceDetail">请点击上方卡片</div>
  </div>
  <script>
    (function () {
      var DETAIL = {
        g: '<strong>重力</strong>：地球对物体的吸引。方向竖直向下。大小 G=mg（g≈9.8 N/kg）。',
        e: '<strong>弹力</strong>：物体发生弹性形变时产生的力。如支持力、拉力，方向垂直接触面。',
        f: '<strong>摩擦力</strong>：阻碍相对运动的力。静摩擦与运动方向相反；大小与压力、接触面粗糙程度有关。'
      };
      var box = document.getElementById('forceDetail');
      var cards = document.querySelectorAll('.force-card');
      var active = null;
      function save() {
        window.parent.postMessage({ type: 'saveState', state: { active: active } }, '*');
      }
      cards.forEach(function (c) {
        c.addEventListener('click', function () {
          active = c.dataset.key;
          cards.forEach(function (x) { x.classList.remove('active'); });
          c.classList.add('active');
          box.innerHTML = DETAIL[active];
          save();
        });
      });
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state && e.data.state.active) {
          var k = e.data.state.active;
          cards.forEach(function (c) {
            if (c.dataset.key === k) c.click();
          });
        }
      });
    })();
  </script>

<template class="page-data" data-id="5" data-name="弹簧测力计">
  <style>
    .lab { display: flex; gap: 20px; flex: 1; min-height: 0; align-items: stretch; }
    .lab-stage {
      flex: 1;

      align-items: center;

    }
    .readout {
      font-size: 32px;

  </style>
  <div class="page-container">
    <div class="page-title">互动：弹簧测力计</div>
    <p style="margin:0 0 10px;font-size:15px;">调节拉力，观察弹簧伸长与示数（单位：N）</p>
    <div class="lab">
      <div class="demo-stage lab-stage" data-interactive>
        <svg id="springSvg" width="120" height="220" viewBox="0 0 120 220">
          <rect x="45" y="0" width="30" height="16" fill="#00404D"/>
          <line id="springTop" x1="60" y1="16" x2="60" y2="40" stroke="#137F8B" stroke-width="3"/>
          <path id="springCoil" d="M50,40 Q70,55 50,70 Q70,85 50,100 Q70,115 50,130" fill="none" stroke="#137F8B" stroke-width="3"/>
          <line id="springBot" x1="60" y1="130" x2="60" y2="160" stroke="#137F8B" stroke-width="3"/>
          <rect id="weight" x="40" y="160" width="40" height="36" fill="#35E9FE" stroke="#00404D" stroke-width="2"/>
          <text x="60" y="183" text-anchor="middle" font-size="13" fill="#00404D">m</text>
        </svg>
      </div>
      <div class="lab-ctrl">
        <div class="readout" id="readout">0.0 <small>N</small></div>
        <label style="font-size:14px;">拉力 F</label>
        <input type="range" id="forceRng" data-interactive min="0" max="10" step="0.5" value="0">
        <div class="status" id="statusTxt">状态：静止</div>
        <div class="ctrl-row">
          <button type="button" class="btn btn-primary" id="btnStart" data-interactive>开始</button>
          <button type="button" class="btn btn-2nd" id="btnReset" data-interactive>重置</button>
        </div>
      </div>
    </div>
    <div class="tip" style="margin-top:10px;">胡克定律（弹性限度内）：弹力大小与伸长量成正比。</div>
  </div>
  <script>
    (function () {
      var rng = document.getElementById('forceRng');
      var readout = document.getElementById('readout');
      var statusTxt = document.getElementById('statusTxt');
      var coil = document.getElementById('springCoil');
      var bot = document.getElementById('springBot');
      var weight = document.getElementById('weight');
      var running = false;
      var baseD = 'M50,40 Q70,55 50,70 Q70,85 50,100 Q70,115 50,130';

      function render(f, skipSave) {
        var extend = f * 4;
        var y2 = 130 + extend;
        var yW = 160 + extend;
        coil.setAttribute('d', baseD + ' Q70,' + (115 + extend * 0.5) + ' 50,' + y2);
        bot.setAttribute('y1', y2);
        bot.setAttribute('y2', yW);
        weight.setAttribute('y', yW);
        readout.innerHTML = f.toFixed(1) + ' <small>N</small>';
        statusTxt.textContent = running ? '状态：测量中' : '状态：静止';
        if (!skipSave) {
          window.parent.postMessage({ type: 'saveState', state: { f: f, running: running } }, '*');
        }
      }

      rng.addEventListener('input', function () {
        if (!running) return;
        render(parseFloat(rng.value));
      });
      document.getElementById('btnStart').addEventListener('click', function () {
        running = true;
        render(parseFloat(rng.value));
      });
      document.getElementById('btnReset').addEventListener('click', function () {
        running = false;
        rng.value = '0';
        render(0);
      });
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state) {
          running = !!e.data.state.running;
          rng.value = String(e.data.state.f != null ? e.data.state.f : 0);
          render(parseFloat(rng.value), true);
        }
      });
      render(0, true);
    })();
  </script>
</template>

<!-- 第 6 页：3D 受力演示 -->
<template class="page-data" data-id="6" data-name="3D受力演示">
  <style>
    .t3d-wrap { display: flex; gap: 14px; flex: 1; min-height: 0; }
    .t3d-canvas-box {
      flex: 1; min-width: 0; height: 280px;
      border: 2px solid var(--demo-border); background: var(--demo-bg);
      position: relative; overflow: hidden;
    }
    #t3dCanvas { width: 100%; height: 100%; display: block; }
    .t3d-side { width: 200px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
    .t3d-legend { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .t3d-legend i { width: 14px; height: 14px; border: 2px solid var(--primary); flex-shrink: 0; }
    .t3d-btns { display: flex; flex-wrap: wrap; gap: 6px; }
    .t3d-btns .btn { flex: 1; min-width: 58px; padding: 8px 6px; font-size: 13px; }
    .t3d-info { font-size: 13px; line-height: 1.5; color: var(--accent); min-height: 40px; }
  </style>
  <div class="page-container">
    <div class="page-title">3D 演示：木块受力</div>
    <p style="margin:0 0 8px;font-size:14px;">拖动旋转视角；调节水平推力，观察重力 G、支持力 N 与摩擦力 f。</p>
    <div class="t3d-wrap">
      <div class="t3d-canvas-box demo-stage" data-interactive>
        <canvas id="t3dCanvas"></canvas>
      </div>
      <div class="t3d-side">
        <div class="card" style="margin:0;padding:10px;">
          <div class="t3d-legend"><i style="background:#DF9012;"></i> G 重力</div>
          <div class="t3d-legend"><i style="background:#137F8B;"></i> N 支持力</div>
          <div class="t3d-legend"><i style="background:#35E9FE;"></i> F 推力</div>
          <div class="t3d-legend"><i style="background:#00404D;"></i> f 摩擦力</div>
        </div>
        <label style="font-size:13px;">水平推力 F (N)</label>
        <input type="range" id="t3dPush" data-interactive min="0" max="12" step="1" value="0">
        <div class="t3d-info" id="t3dInfo">状态：静止平衡</div>
        <div class="t3d-btns">
          <button type="button" class="btn btn-primary" id="t3dStart" data-interactive>开始</button>
          <button type="button" class="btn btn-2nd" id="t3dPause" data-interactive>暂停</button>
          <button type="button" class="btn btn-2nd" id="t3dReset" data-interactive>重置</button>
        </div>
      </div>
    </div>
    <div class="tip" style="margin-top:8px;font-size:14px;">当 F &gt; f 时木块加速运动；F = f 时匀速；F &lt; f 时静止。</div>
  </div>
  <script>
    (function () {
      var canvas = document.getElementById('t3dCanvas');
      var pushRng = document.getElementById('t3dPush');
      var info = document.getElementById('t3dInfo');
      var running = false, paused = false, blockX = 0, vel = 0;
      var renderer, scene, camera, controls, block, arrows = {};
      var animId = null;
      var MU = 0.35, MASS = 2;

      function save() {
        window.parent.postMessage({
          type: 'saveState',
          state: { running: running, paused: paused, push: +pushRng.value, blockX: blockX, vel: vel }
        }, '*');
      }

      function loadScripts(seq, i) {
        if (i >= seq.length) { init3d(); return; }
        var s = document.createElement('script');
        s.src = seq[i];
        s.onload = function () { loadScripts(seq, i + 1); };
        s.onerror = function () { info.textContent = '3D 库加载失败'; };
        document.head.appendChild(s);
      }

      function makeArrow(dir, len, color, origin) {
        var o = origin || new THREE.Vector3(0, 0.55, 0);
        return new THREE.ArrowHelper(dir.clone().normalize(), o, len, color, len * 0.22, len * 0.14);
      }

      function init3d() {
        var THREE = window.THREE;
        var w = canvas.clientWidth || 480, h = canvas.clientHeight || 280;
        renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(w, h, false);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xD3F6F4);

        camera = new THREE.PerspectiveCamera(42, w / h, 0.1, 100);
        camera.position.set(4.2, 3.2, 5.5);
        camera.lookAt(0, 0.4, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        var dl = new THREE.DirectionalLight(0xffffff, 0.85);
        dl.position.set(5, 8, 4);
        scene.add(dl);

        var grid = new THREE.GridHelper(8, 16, 0x93BFC2, 0xDBF1F0);
        grid.position.y = 0;
        scene.add(grid);

        var floor = new THREE.Mesh(
          new THREE.BoxGeometry(8, 0.08, 4),
          new THREE.MeshBasicMaterial({ color: 0xECFCFB })
        );
        floor.position.y = -0.04;
        scene.add(floor);

        block = new THREE.Mesh(
          new THREE.BoxGeometry(0.9, 0.9, 0.9),
          new THREE.MeshLambertMaterial({ color: 0x35E9FE })
        );
        block.position.set(0, 0.45, 0);
        var edge = new THREE.LineSegments(
          new THREE.EdgesGeometry(block.geometry),
          new THREE.LineBasicMaterial({ color: 0x00404D })
        );
        block.add(edge);
        scene.add(block);

        arrows.g = makeArrow(new THREE.Vector3(0, -1, 0), 1.1, 0xDF9012);
        arrows.n = makeArrow(new THREE.Vector3(0, 1, 0), 1.1, 0x137F8B);
        arrows.f = makeArrow(new THREE.Vector3(1, 0, 0), 0.9, 0x35E9FE);
        arrows.fr = makeArrow(new THREE.Vector3(-1, 0, 0), 0.7, 0x00404D);
        Object.keys(arrows).forEach(function (k) { scene.add(arrows[k]); });

        if (THREE.OrbitControls) {
          controls = new THREE.OrbitControls(camera, canvas);
          controls.enableDamping = true;
          controls.target.set(0, 0.4, 0);
          controls.maxPolarAngle = Math.PI * 0.48;
        }

        updateArrows();
        loop();
        window.addEventListener('resize', onResize);
      }

      function onResize() {
        if (!renderer) return;
        var w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
      }

      function frictionForce() { return MU * MASS * 9.8; }

      function updateArrows() {
        var F = +pushRng.value;
        var fmax = frictionForce();
        var origin = block.position.clone();
        origin.y = 0.45;
        arrows.g.position.copy(origin);
        arrows.n.position.copy(origin);
        arrows.f.position.copy(origin);
        arrows.fr.position.copy(origin);
        var fShow = running ? Math.min(F, fmax) : (F > 0 ? Math.min(F, fmax) : 0);
        arrows.f.setLength(Math.max(0.25, F * 0.08), F * 0.08 * 0.22, F * 0.08 * 0.14);
        arrows.fr.setLength(Math.max(0.2, fShow * 0.08), fShow * 0.08 * 0.22, fShow * 0.08 * 0.14);
        arrows.f.visible = F > 0.1;
        arrows.fr.visible = F > 0.1;
      }

      function updateInfo() {
        var F = +pushRng.value, f = frictionForce();
        if (!running) {
          if (F < 0.5) info.textContent = '状态：静止平衡';
          else if (F < f) info.textContent = '状态：静止（F < f，未滑动）';
          else info.textContent = '状态：可运动，点击「开始」';
          return;
        }
        if (paused) { info.textContent = '状态：已暂停'; return; }
        if (F > f + 0.5) info.textContent = '状态：加速运动（F > f）';
        else if (Math.abs(F - f) < 0.6) info.textContent = '状态：匀速或平衡';
        else info.textContent = '状态：减速至停止';
      }

      function physics(dt) {
        if (!running || paused) return;
        var F = +pushRng.value, f = frictionForce();
        var net = F - f;
        if (Math.abs(vel) < 0.01 && net <= 0) { vel = 0; return; }
        var acc = net / MASS;
        vel += acc * dt;
        vel *= 0.985;
        blockX += vel * dt;
        if (blockX > 3) { blockX = 3; vel = 0; }
        if (blockX < -3) { blockX = -3; vel = 0; }
        block.position.x = blockX;
        updateArrows();
        updateInfo();
      }

      var last = 0;
      function loop(t) {
        animId = requestAnimationFrame(loop);
        var dt = last ? Math.min((t - last) / 1000, 0.05) : 0;
        last = t;
        physics(dt);
        if (controls) controls.update();
        if (renderer) renderer.render(scene, camera);
      }

      document.getElementById('t3dStart').addEventListener('click', function () {
        running = true; paused = false; updateInfo(); save();
      });
      document.getElementById('t3dPause').addEventListener('click', function () {
        if (!running) return;
        paused = !paused; updateInfo(); save();
      });
      document.getElementById('t3dReset').addEventListener('click', function () {
        running = false; paused = false; blockX = 0; vel = 0;
        pushRng.value = '0';
        block.position.x = 0;
        updateArrows(); updateInfo(); save();
      });
      pushRng.addEventListener('input', function () {
        updateArrows(); updateInfo(); save();
      });

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state) {
          var st = e.data.state;
          running = !!st.running; paused = !!st.paused;
          pushRng.value = String(st.push != null ? st.push : 0);
          blockX = st.blockX || 0; vel = st.vel || 0;
          if (block) block.position.x = blockX;
          updateArrows(); updateInfo();
        }
      });

      loadScripts([
        'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js',
        'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js'
      ], 0);
    })();
  </script>
</template>

<template class="page-data" data-id="8" data-name="课堂测验">
  <style>
    .quiz .q { font-size: 15px; font-weight: 700; margin: 10px 0 6px; }
    .opt {
      display: block; width: 100%; text-align: left; margin: 4px 0; padding: 8px 12px;
      border: 2px solid var(--card-border); border-radius: var(--radius);
      background: #fff; cursor: pointer; font-size: 14px; font-family: inherit;
    }
    .opt.picked { border-color: var(--primary); background: #ECFCFB; }
    .opt.correct { border-color: var(--success); color: var(--success); }
    .opt.wrong { border-color: var(--error); color: var(--error); }
    .foot { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-shrink: 0; }
    #score { flex: 1; font-weight: 700; color: var(--primary); font-size: 15px; }
  </style>
  <div class="page-container quiz">
    <div class="page-title">课堂测验</div>
    <p class="q">1. 力的三要素不包括下列哪一项？</p>
    <button type="button" class="opt" data-interactive data-q="0" data-v="A">A. 大小</button>
    <button type="button" class="opt" data-interactive data-q="0" data-v="B">B. 方向</button>
    <button type="button" class="opt" data-interactive data-q="0" data-v="C">C. 作用点</button>
    <button type="button" class="opt" data-interactive data-q="0" data-v="D">D. 速度</button>
    <p class="q">2. 重力的方向总是？</p>
    <button type="button" class="opt" data-interactive data-q="1" data-v="A">A. 竖直向下</button>
    <button type="button" class="opt" data-interactive data-q="1" data-v="B">B. 竖直向上</button>
    <button type="button" class="opt" data-interactive data-q="1" data-v="C">C. 水平向前</button>
    <p class="q">3. 二力平衡时，两个力必须？</p>
    <button type="button" class="opt" data-interactive data-q="2" data-v="A">A. 作用在同一物体上，等大反向共线</button>
    <button type="button" class="opt" data-interactive data-q="2" data-v="B">B. 作用在两个物体上</button>
    <button type="button" class="opt" data-interactive data-q="2" data-v="C">C. 大小不等但方向相反</button>
    <div class="foot">
      <span id="score">请完成 3 题后提交</span>
      <button type="button" class="btn btn-2nd" id="retry" data-interactive>重做</button>
      <button type="button" class="btn btn-primary" id="submit" data-interactive>提交</button>
    </div>
  </div>
  <script>
    (function () {
      var ANS = { 0: 'D', 1: 'A', 2: 'A' };
      var pick = { 0: null, 1: null, 2: null };
      var done = false;
      var s = document.getElementById('score');

      function save() {
        window.parent.postMessage({ type: 'saveState', state: { pick: pick, done: done } }, '*');
      }

      document.querySelectorAll('.opt').forEach(function (b) {
        b.addEventListener('click', function () {
          if (done) return;
          pick[b.dataset.q] = b.dataset.v;
          document.querySelectorAll('.opt[data-q="' + b.dataset.q + '"]').forEach(function (x) {
            x.classList.remove('picked');
          });
          b.classList.add('picked');
          save();
        });
      });

      function grade() {
        if (!pick[0] || !pick[1] || !pick[2]) {
          s.textContent = '请完成全部 3 题';
          return;
        }
        done = true;
        var ok = [0, 1, 2].filter(function (i) { return pick[i] === ANS[i]; }).length;
        document.querySelectorAll('.opt').forEach(function (b) {
          b.disabled = true;
          var q = b.dataset.q, v = b.dataset.v;
          if (v === ANS[q]) b.classList.add('correct');
          else if (v === pick[q]) b.classList.add('wrong');
        });
        s.textContent = '得分：' + ok + ' / 3' + (ok === 3 ? '，全部正确！' : '，请查看错题');
        save();
      }

      document.getElementById('submit').addEventListener('click', grade);
      document.getElementById('retry').addEventListener('click', function () {
        done = false;
        pick = { 0: null, 1: null, 2: null };
        document.querySelectorAll('.opt').forEach(function (b) {
          b.disabled = false;
          b.classList.remove('picked', 'correct', 'wrong');
        });
        s.textContent = '请完成 3 题后提交';
        save();
      });

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state) {
          pick = e.data.state.pick || pick;
          done = !!e.data.state.done;
          document.querySelectorAll('.opt').forEach(function (b) {
            if (pick[b.dataset.q] === b.dataset.v) b.classList.add('picked');
          });
          if (done) grade();
        }
      });
    })();
  </script>
</template>
