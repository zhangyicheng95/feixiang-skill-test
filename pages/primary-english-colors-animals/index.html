        <p class="pg-sub subtitle">点击颜色，读出英文单词。</p>
        <div class="color-btns" id="colorButtons">
          <button class="color-btn" data-key="red" style="background:#E74C3C;color:#fff;">red</button>
          <button class="color-btn" data-key="orange" style="background:#F39C3D;color:#2d1f00;">orange</button>
          <button class="color-btn" data-key="yellow" style="background:#F4D03F;color:#3d3200;">yellow</button>
          <button class="color-btn" data-key="green" style="background:#4CAF50;color:#fff;">green</button>
          <button class="color-btn" data-key="blue" style="background:#3498DB;color:#fff;">blue</button>
        </div>
        <div class="display-box panel">
          <div class="display-word" id="displayWord">Choose a color</div>
          <div class="display-phonetic" id="displayHint">点击上方按钮开始</div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var colors = {
          red: { word: "red", hint: "/red/" },
          orange: { word: "orange", hint: "/'or-indj/" },
          yellow: { word: "yellow", hint: "/'yel-oh/" },
          green: { word: "green", hint: "/gri:n/" },
          blue: { word: "blue", hint: "/blu:/" }
        };
        var state = { selected: null };
        var wordEl = document.getElementById("displayWord");
        var hintEl = document.getElementById("displayHint");
        var buttonsWrap = document.getElementById("colorButtons");

        function render() {
          if (!state.selected || !colors[state.selected]) {
            wordEl.textContent = "Choose a color";
            hintEl.textContent = "点击上方按钮开始";
            return;
          }
          wordEl.textContent = colors[state.selected].word;
          hintEl.textContent = colors[state.selected].hint;
        }

        buttonsWrap.addEventListener("click", function (event) {
          var btn = event.target.closest("button[data-key]");
          if (!btn) {
            return;
          }
          state.selected = btn.getAttribute("data-key");
          render();
        });

        window.saveState = function () {
          return { selected: state.selected };
        };

        window.restoreState = function (saved) {
          state.selected = saved && saved.selected ? saved.selected : null;
          render();
        };

        render();
      })();
    </script>
  </template>

    <div class="page-container">

      </style>
      <div class="match-page">
        <h2 class="pg-title">互动：动物颜色配对</h2>
        <p class="pg-sub subtitle">先选动物，再选短语，组成 4 组配对。</p>
        <div class="match-columns">
          <div class="match-col panel">
            <h3>Animals</h3>
            <div class="pick-list" id="animalList">
              <button class="pick-btn" data-animal="cat">cat</button>
              <button class="pick-btn" data-animal="dog">dog</button>
              <button class="pick-btn" data-animal="bird">bird</button>
              <button class="pick-btn" data-animal="fish">fish</button>
            </div>
          </div>
          <div class="match-col panel">
            <h3>Color Phrases</h3>
            <div class="pick-list" id="phraseList">
              <button class="pick-btn" data-phrase="cat">a yellow cat</button>
              <button class="pick-btn" data-phrase="dog">a brown dog</button>
              <button class="pick-btn" data-phrase="bird">a blue bird</button>
              <button class="pick-btn" data-phrase="fish">a red fish</button>
            </div>
          </div>
        </div>
        <div class="panel pair-board">
          <div id="pairText">已配对：暂无</div>
          <div id="matchResult" class="status"></div>
          <div class="btn-row" style="margin-top:4px;">
            <button class="primary" id="checkBtn" style="padding:6px 12px;font-size:14px;">检查</button>
            <button class="secondary" id="resetBtn" style="padding:6px 12px;font-size:14px;">重置</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var correctKeys = ["cat", "dog", "bird", "fish"];
        var state = {
          selectedAnimal: null,
          selectedPhrase: null,
          pairs: {}
        };

        var animalList = document.getElementById("animalList");
        var phraseList = document.getElementById("phraseList");
        var pairText = document.getElementById("pairText");
        var result = document.getElementById("matchResult");
        var checkBtn = document.getElementById("checkBtn");
        var resetBtn = document.getElementById("resetBtn");

        function getPhraseLabel(key) {
          var map = {
            cat: "a yellow cat",
            dog: "a brown dog",
            bird: "a blue bird",
            fish: "a red fish"
          };
          return map[key];
        }

        function renderButtons() {
          var animalBtns = animalList.querySelectorAll("button");
          var phraseBtns = phraseList.querySelectorAll("button");
          animalBtns.forEach(function (btn) {
            var isActive = btn.getAttribute("data-animal") === state.selectedAnimal;
            btn.classList.toggle("active", isActive);
          });
          phraseBtns.forEach(function (btn) {
            var isActive = btn.getAttribute("data-phrase") === state.selectedPhrase;
            btn.classList.toggle("active", isActive);
          });
        }

        function renderPairs() {
          var keys = Object.keys(state.pairs);
          if (!keys.length) {
            pairText.textContent = "已配对：暂无";
            return;
          }
          var lines = keys.map(function (animal) {
            return animal + " -> " + getPhraseLabel(state.pairs[animal]);
          });
          pairText.textContent = "已配对：" + lines.join("；");
        }

        function tryPair() {
          if (!state.selectedAnimal || !state.selectedPhrase) {
            return;
          }
          state.pairs[state.selectedAnimal] = state.selectedPhrase;
          state.selectedAnimal = null;
          state.selectedPhrase = null;
          renderButtons();
          renderPairs();
        }

        animalList.addEventListener("click", function (event) {
          var btn = event.target.closest("button[data-animal]");
          if (!btn) {
            return;
          }
          state.selectedAnimal = btn.getAttribute("data-animal");
          renderButtons();
          tryPair();
        });

        phraseList.addEventListener("click", function (event) {
          var btn = event.target.closest("button[data-phrase]");
          if (!btn) {
            return;
          }
          state.selectedPhrase = btn.getAttribute("data-phrase");
          renderButtons();
          tryPair();
        });

        checkBtn.addEventListener("click", function () {
          var matched = 0;
          correctKeys.forEach(function (key) {
            if (state.pairs[key] === key) {
              matched += 1;
            }
          });
          if (matched === 4) {
            result.className = "status ok";
            result.textContent = "正确！4/4 全部配对成功。";
          } else {
            result.className = "status bad";
            result.textContent = "还可以再试试。当前正确 " + matched + "/4。";
          }
        });

        resetBtn.addEventListener("click", function () {
          state.selectedAnimal = null;
          state.selectedPhrase = null;
          state.pairs = {};
          result.className = "status";
          result.textContent = "";
          renderButtons();
          renderPairs();
        });

        window.saveState = function () {
          return {
            selectedAnimal: state.selectedAnimal,
            selectedPhrase: state.selectedPhrase,
            pairs: state.pairs
          };
        };

        window.restoreState = function (saved) {
          state.selectedAnimal = saved && saved.selectedAnimal ? saved.selectedAnimal : null;
          state.selectedPhrase = saved && saved.selectedPhrase ? saved.selectedPhrase : null;
          state.pairs = saved && saved.pairs ? saved.pairs : {};
          result.className = "status";
          result.textContent = "";
          renderButtons();
          renderPairs();
        };

        renderButtons();
        renderPairs();
      })();
    </script>
  </template>

          border-radius: 10px;
          border: 2px solid var(--card-border);
          background: #fff;
          font-size: 22px;
          text-align: left;
          padding: 10px 12px;
        }

        .quiz-option.selected {
          border-color: var(--accent);
          background: #ecf7e7;
        }

        .quiz-option.correct {
          border-color: var(--success);
          background: #e7f7ee;
        }

        .quiz-option.wrong {
          border-color: var(--error);
          background: #fae9e9;
        }

        .result-box {
          height: 100%;
          display: grid;
          place-content: center;
          gap: 14px;
          text-align: center;
        }

        .result-score {
          font-size: 56px;
          color: var(--primary);
          font-weight: 800;
        }
      </style>
      <div class="quiz-page">
        <h2 class="pg-title">练习：单选 5 题</h2>
        <p class="subtitle">每题先选择，再点击“确认答案”。</p>
        <div class="quiz-card panel" id="quizCard"></div>
        <div class="btn-row">
          <button class="primary" id="confirmBtn">确认答案</button>
          <button class="secondary" id="nextBtn">下一题</button>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var questions = [
          {
            q: "Which word means 红色?",
            options: ["green", "red", "blue", "cat"],
            answer: 1
          },
          {
            q: "Which animal is 鱼?",
            options: ["bird", "fish", "dog", "yellow"],
            answer: 1
          },
          {
            q: "What color is banana? (常见颜色)",
            options: ["yellow", "blue", "red", "brown"],
            answer: 0
          },
          {
            q: "Choose the correct phrase:",
            options: ["a blue bird", "a green fish cat", "dog yellow", "it blue is"],
            answer: 0
          },
          {
            q: "Fill in: It is ___. (图片提示: grass)",
            options: ["orange", "green", "cat", "fish"],
            answer: 1
          }
        ];

        var state = {
          index: 0,
          answers: [null, null, null, null, null],
          confirmed: [false, false, false, false, false],
          score: 0,
          finished: false
        };

        var quizCard = document.getElementById("quizCard");
        var confirmBtn = document.getElementById("confirmBtn");
        var nextBtn = document.getElementById("nextBtn");

        function renderQuestion() {
          var q = questions[state.index];
          var selected = state.answers[state.index];
          var isConfirmed = state.confirmed[state.index];

          var html = "";
          html += '<div class="quiz-progress">Question ' + (state.index + 1) + ' / ' + questions.length + "</div>";
          html += '<div class="quiz-question">' + q.q + "</div>";
          html += '<div class="quiz-options">';
          q.options.forEach(function (opt, i) {
            var cls = "quiz-option";
            if (selected === i) {
              cls += " selected";
            }
            if (isConfirmed && i === q.answer) {
              cls += " correct";
            }
            if (isConfirmed && selected === i && i !== q.answer) {
              cls += " wrong";
            }
            html += '<button class="' + cls + '" data-index="' + i + '">' + opt + "</button>";
          });
          html += "</div>";

          if (isConfirmed) {
            if (selected === q.answer) {
              html += '<div class="status ok">回答正确！</div>';
            } else {
              html += '<div class="status bad">回答错误。正确答案是：' + q.options[q.answer] + "</div>";
            }
          } else {
            html += '<div class="status">请选择后确认。</div>';
          }

          quizCard.innerHTML = html;
          confirmBtn.style.display = "inline-block";
          nextBtn.style.display = "inline-block";
          nextBtn.textContent = state.index === questions.length - 1 ? "查看结果" : "下一题";
        }

        function renderResult() {
          quizCard.innerHTML =
            '<div class="result-box">' +
            '<div style="font-size:34px;color:var(--primary);font-weight:700;">Result</div>' +
            '<div class="result-score">' + state.score + " / " + questions.length + "</div>" +
            '<div style="font-size:22px;">你完成了本次测验。</div>' +
            '<button class="secondary" id="retryBtn">重做</button>' +
            "</div>";
          confirmBtn.style.display = "none";
          nextBtn.style.display = "none";
          var retryBtn = document.getElementById("retryBtn");
          retryBtn.addEventListener("click", function () {
            state.index = 0;
            state.answers = [null, null, null, null, null];
            state.confirmed = [false, false, false, false, false];
            state.score = 0;
            state.finished = false;
            render();
          });
        }

        function render() {
          if (state.finished) {
            renderResult();
          } else {
            renderQuestion();
          }
        }

        quizCard.addEventListener("click", function (event) {
          if (state.finished) {
            return;
          }
          var btn = event.target.closest("button[data-index]");
          if (!btn) {
            return;
          }
          if (state.confirmed[state.index]) {
            return;
          }
          state.answers[state.index] = Number(btn.getAttribute("data-index"));
          render();
        });

        confirmBtn.addEventListener("click", function () {
          if (state.finished) {
            return;
          }
          if (state.confirmed[state.index]) {
            return;
          }
          var selected = state.answers[state.index];
          if (selected === null) {
            return;
          }
          state.confirmed[state.index] = true;
          if (selected === questions[state.index].answer) {
            state.score += 1;
          }
          render();
        });

        nextBtn.addEventListener("click", function () {
          if (state.finished) {
            return;
          }
          if (!state.confirmed[state.index]) {
            return;
          }
          if (state.index === questions.length - 1) {
            state.finished = true;
            var payload = {
              type: "cwScore",
              id: 8,
              score: state.score,
              total: questions.length
            };
            if (window.parent && window.parent !== window) {
              window.parent.postMessage(payload, "*");
            }
            render();
            return;
          }
          state.index += 1;
          render();
        });

        window.saveState = function () {
          return {
            index: state.index,
            answers: state.answers,
            confirmed: state.confirmed,
            score: state.score,
            finished: state.finished
          };
        };

        window.restoreState = function (saved) {
          if (!saved) {
            render();
            return;
          }
          state.index = typeof saved.index === "number" ? saved.index : 0;
          state.answers = Array.isArray(saved.answers) ? saved.answers : [null, null, null, null, null];
          state.confirmed = Array.isArray(saved.confirmed) ? saved.confirmed : [false, false, false, false, false];
          state.score = typeof saved.score === "number" ? saved.score : 0;
          state.finished = Boolean(saved.finished);
          render();
        };

        render();
      })();
    </script>
  </template>
