<template class="page-data" data-id="5" data-name="点阵图互动">
  <style>
    .dots-wrap {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      height:100%;

    .dots-grid {

      min-height:190px;
    }
    .dot {
      width:20px;
      height:20px;
      border-radius:50%;
      background:var(--primary);
      box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);
    }
    .eq-label {
      font-size:28px;
      font-weight:700;
      color:var(--text);
      margin:0;
      min-height:38px;
    }
  </style>
  <div class="page-container">
    <p class="eyebrow">互动理解</p>
    <h2 class="page-title">点阵图看乘法</h2>
    <div class="toolbar">
      <button class="btn btn-primary" type="button" data-exp="2x3">2 × 3</button>
      <button class="btn" type="button" data-exp="3x4">3 × 4</button>
      <button class="btn" type="button" data-exp="4x5">4 × 5</button>
    </div>
    <div class="demo fill">
      <div class="dots-wrap">
        <p id="eq-label" class="eq-label">2 × 3 = 6</p>
        <div id="dots-grid" class="dots-grid" aria-label="点阵图"></div>
      </div>
    </div>
    <div class="tip">点击上方算式，观察“几行几列”的点阵变化，再读出乘法结果。</div>
  </div>
  <script>
  (function(){
    var current = "2x3";
    var map = {
      "2x3": { r:2, c:3, t:"2 × 3 = 6" },
      "3x4": { r:3, c:4, t:"3 × 4 = 12" },
      "4x5": { r:4, c:5, t:"4 × 5 = 20" }
    };
    function render(){
      var cfg = map[current];
      var grid = document.getElementById("dots-grid");
      var eq = document.getElementById("eq-label");
      if(!cfg || !grid || !eq) return;
      eq.textContent = cfg.t;
      grid.style.gridTemplateColumns = "repeat(" + cfg.c + ", 20px)";
      var html = "";
      var i;
      for(i = 0; i < cfg.r * cfg.c; i++){ html += '<span class="dot"></span>'; }
      grid.innerHTML = html;
      document.querySelectorAll('[data-exp]').forEach(function(btn){
        btn.classList.toggle("active", btn.getAttribute("data-exp") === current);
        btn.classList.toggle("btn-primary", btn.getAttribute("data-exp") === current);
      });
    }
    function save(){
      window.parent.postMessage({ type:"saveState", state:{ current:current } }, "*");
    }
    function restore(s){
      if(s && s.current && map[s.current]){
        current = s.current;
      }
      render();
    }
    window.addEventListener("message", function(e){
      if(e.data && e.data.type === "restoreState"){ restore(e.data.state); }
    });
    window.addEventListener("DOMContentLoaded", function(){
      document.querySelectorAll('[data-exp]').forEach(function(btn){
        btn.addEventListener("click", function(){
          current = btn.getAttribute("data-exp");
          render();
          save();
        });
      });
      render();
    });
  })();
  </script>
</template>

  </div>
  <script>
  (function(){
    var rows = [
      "二一得二","二二得四","二三得六","二四得八","二五一十",
      "三一得三","三二得六","三三得九","三四十二","三五十五",
      "四一得四","四二得八","四三十二","四四十六","四五二十",
      "五一得五","五二一十","五三十五","五四二十","五五二十五"
    ];
    var active = -1;
    function render(){
      var box = document.getElementById("koujue-grid");
      if(!box) return;
      var html = "";
      rows.forEach(function(text, idx){
        var cls = "koujue-row" + (idx === active ? " active" : "");
        html += '<button type="button" class="' + cls + '" data-idx="' + idx + '"><strong>' + (idx + 1) + ".</strong>" + text + "</button>";
      });
      box.innerHTML = html;
      box.querySelectorAll(".koujue-row").forEach(function(btn){
        btn.addEventListener("click", function(){
          active = Number(btn.getAttribute("data-idx"));
          render();
          save();

      });
      var tip = document.getElementById("koujue-tip");
      if(tip && active >= 0){
        tip.textContent = "当前口诀：" + rows[active] + "。请大声读两遍。";

      window.parent.postMessage({ type:"saveState", state:{ active:active } }, "*");

<template class="page-data" data-id="7" data-name="例题精讲">
  <div class="page-container">
    <p class="eyebrow">例题</p>
    <h2 class="page-title">小明的铅笔一共有多少支？</h2>
    <div class="card fill" style="display:flex;flex-direction:column;gap:8px">
      <p style="margin:0;font-size:16px;line-height:1.5">
        <strong>题目：</strong>小明有 <strong>3 盒</strong>铅笔，每盒有 <strong>4 支</strong>。一共有多少支铅笔？
      </p>
      <div id="s0" class="tip">点击「下一步」，按步骤完成这道题。</div>
      <div id="s1" class="card" style="display:none">
        <strong>第1步：</strong>先看“有几盒、每盒几支”。<br>
        这是 <strong>3 组</strong>，每组 <strong>4 支</strong>。
      </div>
      <div id="s2" class="card" style="display:none">
        <strong>第2步：</strong>可以写连加：4 + 4 + 4 = 12。
      </div>
      <div id="s3" class="card" style="display:none">
        <strong>第3步：</strong>改写成乘法：3 × 4 = 12。
      </div>
      <div id="s4" class="tip ok" style="display:none">
        <strong>答：</strong>小明一共有 <strong>12 支</strong>铅笔。
      </div>
    </div>
    <div class="toolbar">
      <button class="btn btn-primary" id="next-step" type="button">下一步</button>
    </div>
  </div>
  <script>
  (function(){
    var step = 0;
    var ids = ["s0","s1","s2","s3","s4"];
    function render(){
      ids.forEach(function(id, idx){
        var el = document.getElementById(id);
        if(el){ el.style.display = idx <= step ? "block" : "none"; }
      });
      var btn = document.getElementById("next-step");
      if(btn){
        btn.disabled = step >= 4;
        btn.textContent = step >= 4 ? "已完成" : "下一步";
      }
    }
    function save(){
      window.parent.postMessage({ type:"saveState", state:{ step:step } }, "*");
    }
    function restore(s){
      if(s && typeof s.step === "number"){ step = s.step; }
      render();
    }
    window.addEventListener("message", function(e){
      if(e.data && e.data.type === "restoreState"){ restore(e.data.state); }
    });
    window.addEventListener("DOMContentLoaded", function(){
      var btn = document.getElementById("next-step");
      if(btn){
        btn.addEventListener("click", function(){
          if(step < 4){
            step += 1;
            render();
            save();
          }
        });
      }
      render();
    });
  })();
  </script>
</template>

    .opt.correct { border-color:var(--success); background:#f0faf4; }
    .opt.wrong { border-color:var(--error); background:#fdf3f2; }
    #quiz-stem {
      margin:0 0 8px;
      font-size:17px;
      line-height:1.4;
      font-weight:700;
    }
    #quiz-opts {
      flex:1;
      min-height:0;
      overflow:hidden;
    }
  </style>
  <div class="page-container">
    <p class="eyebrow">课堂练习</p>
    <h2 class="page-title">单选题（5题）</h2>
    <div id="quiz-view" class="quiz-body">
      <div id="quiz-prog" style="font-size:13px;color:var(--accent);margin-bottom:6px">第 1 / 5 题</div>
      <p id="quiz-stem"></p>
      <div id="quiz-opts"></div>
      <div id="quiz-explain" class="tip" style="display:none;margin-top:6px"></div>
      <div class="toolbar" style="margin-top:8px">
        <button class="btn" id="quiz-prev" type="button">上一题</button>
        <button class="btn btn-primary" id="quiz-confirm" type="button">确认答案</button>
        <button class="btn btn-primary" id="quiz-next" type="button" disabled>下一题</button>
      </div>
    </div>
    <div id="quiz-result" style="display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px">
      <p id="quiz-score" style="margin:0;font-size:30px;font-weight:700"></p>
      <p style="margin:0;font-size:16px">练习完成，继续翻页查看本课小结。</p>
      <button class="btn btn-primary" id="quiz-redo" type="button">重新练习</button>
    </div>
  </div>
  <script>
  (function(){
    var QUESTIONS = [
      { stem:"3 + 3 + 3 可以写成哪道乘法算式？", options:[{k:"A",text:"3×2"},{k:"B",text:"3×3"},{k:"C",text:"2×3"},{k:"D",text:"3×4"}], ans:"B", explain:"3 个 3 相加，所以写成 3×3。"},
      { stem:"2×5 的结果是几？", options:[{k:"A",text:"7"},{k:"B",text:"8"},{k:"C",text:"10"},{k:"D",text:"12"}], ans:"C", explain:"二五一十，所以 2×5=10。"},
      { stem:"下面哪句口诀对应 4×3？", options:[{k:"A",text:"三四十二"},{k:"B",text:"四四十六"},{k:"C",text:"三五十五"},{k:"D",text:"二四得八"}], ans:"A", explain:"4×3 和 3×4 同样是 12，对应三四十二。"},
      { stem:"小红有 4 盒糖，每盒 2 颗，一共几颗？", options:[{k:"A",text:"6"},{k:"B",text:"8"},{k:"C",text:"10"},{k:"D",text:"12"}], ans:"B", explain:"4 组每组 2 颗，4×2=8。"},
      { stem:"5×5 的结果是？", options:[{k:"A",text:"15"},{k:"B",text:"20"},{k:"C",text:"25"},{k:"D",text:"30"}], ans:"C", explain:"五五二十五，所以答案是 25。"}
    ];
    var state = { phase:"quiz", index:0, answers:{}, revealed:{} };
    function el(id){ return document.getElementById(id); }
    function save(){
      window.parent.postMessage({ type:"saveState", state:JSON.parse(JSON.stringify(state)) }, "*");
    }
    function sendScore(){
      var ok = 0;
      QUESTIONS.forEach(function(q, i){ if(state.answers[i] === q.ans){ ok += 1; } });
      window.parent.postMessage({ type:"cwScore", id:8, raw:ok, max:QUESTIONS.length }, "*");
    }
    function render(){
      if(state.phase === "result"){
        el("quiz-view").style.display = "none";
        el("quiz-result").style.display = "flex";
        var ok = 0;
        QUESTIONS.forEach(function(q, i){ if(state.answers[i] === q.ans){ ok += 1; } });
        el("quiz-score").textContent = "得分：" + ok + " / " + QUESTIONS.length;
        sendScore();
        return;
      }
      el("quiz-view").style.display = "flex";
      el("quiz-result").style.display = "none";
      var q = QUESTIONS[state.index];
      el("quiz-prog").textContent = "第 " + (state.index + 1) + " / " + QUESTIONS.length + " 题";
      el("quiz-stem").textContent = q.stem;

      var opts = "";
      q.options.forEach(function(o){
        var sel = state.answers[state.index] === o.k;
        var rev = !!state.revealed[state.index];
        var cls = "opt" + (sel ? " sel" : "");
        if(rev){
          if(o.k === q.ans){ cls += " correct"; }
          else if(sel){ cls += " wrong"; }
        }
        opts += '<button type="button" class="' + cls + '" data-k="' + o.k + '">' + o.k + ". " + o.text + "</button>";
      });
      el("quiz-opts").innerHTML = opts;
      el("quiz-opts").querySelectorAll(".opt").forEach(function(btn){
        if(state.revealed[state.index]) return;
        btn.addEventListener("click", function(){
          state.answers[state.index] = btn.getAttribute("data-k");
          render();
          save();
        });
      });

      var revealed = !!state.revealed[state.index];
      el("quiz-explain").style.display = revealed ? "block" : "none";
      el("quiz-explain").textContent = revealed ? ((state.answers[state.index] === q.ans ? "回答正确。 " : "回答错误。 ") + q.explain) : "";
      el("quiz-explain").className = "tip " + (revealed ? (state.answers[state.index] === q.ans ? "ok" : "err") : "");
      el("quiz-confirm").disabled = !state.answers[state.index] || revealed;
      el("quiz-prev").disabled = state.index === 0;
      el("quiz-next").disabled = !revealed;
      if(state.index === QUESTIONS.length - 1){
        el("quiz-next").textContent = revealed ? "查看结果" : "下一题";
      } else {
        el("quiz-next").textContent = "下一题";
      }
    }
    function restore(s){
      if(!s) return;
      state = Object.assign(state, s);
      render();
    }
    window.addEventListener("message", function(e){
      if(e.data && e.data.type === "restoreState"){ restore(e.data.state); }
    });
    window.addEventListener("DOMContentLoaded", function(){
      el("quiz-confirm").addEventListener("click", function(){
        if(!state.answers[state.index]) return;
        state.revealed[state.index] = true;
        render();
        save();
      });
      el("quiz-prev").addEventListener("click", function(){
        if(state.index > 0){
          state.index -= 1;
          render();
          save();
        }
      });
      el("quiz-next").addEventListener("click", function(){
        if(!state.revealed[state.index]) return;
        if(state.index < QUESTIONS.length - 1){
          state.index += 1;
          render();
          save();
        } else {
          state.phase = "result";
          render();
          save();
        }
      });
      el("quiz-redo").addEventListener("click", function(){
        state = { phase:"quiz", index:0, answers:{}, revealed:{} };
        render();
        save();
      });
      render();
    });
  })();
  </script>
</template>

<template class="page-data" data-id="9" data-name="课堂小结">
  <div class="page-container">
    <p class="eyebrow">课末总结</p>
